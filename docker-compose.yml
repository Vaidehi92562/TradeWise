version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: tradewise-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Vaidehi@123
      MYSQL_DATABASE: tradewise_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: tradewise-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tradewise_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Vaidehi@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8080"

  frontend:
    build:
      context: ./frontend
    container_name: tradewise-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8083:80"

volumes:
  mysql_data: